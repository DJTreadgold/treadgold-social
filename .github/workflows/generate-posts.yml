name: Generate Social Posts

on:
  push:
    paths:
      - 'posts/**.json'
      - 'treadgold_social_template.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Montserrat font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-montserrat fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate images
        run: python treadgold_social_template.py

      - name: Commit generated images
        run: |
          git config user.name "Treadgold Bot"
          git config user.email "bot@treadgoldfinance.com.au"
          git add *.png
          if git diff --staged --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Auto-generate social post images [skip ci]"
            git push
          fi
